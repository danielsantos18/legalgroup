<section id="home" class="hero">

  <!-- Decorative background -->
  <div class="hero__bg">
    <div class="hero__circle hero__circle--1"></div>
    <div class="hero__circle hero__circle--2"></div>
    <div class="hero__circle hero__circle--3"></div>
  </div>

  <!-- Emblem decorativo: zona oscura inferior izquierda -->
  <div class="hero__emblem">
    <div class="hero__ring hero__ring--outer"></div>
    <div class="hero__ring hero__ring--mid"></div>
    <div class="hero__ring hero__ring--inner"></div>
    <div class="hero__emblem-core">
    </div>
  </div>

  <div class="container position-relative">
    <div class="row">

      <!-- Copy -->
      <div class="col-lg-7 col-12 text-lg-start text-center">

        <div class="hero__badge">
          <span class="hero__badge-dot"></span>
          <h4>Asesorías e Inversiones Legal Group S.A.S</h4>
        </div>

        <h5 class="hero__title">
          Defendemos tus derechos<br>
          con <span>excelencia jurídica</span>
        </h5>

        <p class="hero__subtitle">
          Brindamos asesoría legal estratégica con enfoque en resultados,
          confianza y compromiso con cada cliente.
        </p>

        <div class="hero__actions">
          <a [routerLink]="['/']" fragment="contact" class="hero__btn-primary">
            <i class="bi bi-calendar-check-fill me-2"></i>
            Consulta Gratis
          </a>
          <a [routerLink]="['/']" fragment="services" class="hero__btn-outline">
            Nuestros Servicios
            <i class="bi bi-arrow-right ms-2"></i>
          </a>
        </div>

      </div>
    </div>

  </div>
</section>
